name: Playwright E2E Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

  # ── Run tests every Monday at 12 PM IST (6:30 AM UTC) ─────────────────
  schedule:
    - cron: '30 6 * * 1'  # Every Monday at 12:30 PM IST

  # ── Allow manual trigger ───────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write

jobs:

  # ── Job 1: Smoke Tests ─────────────────────────────────────────────────
  smoke:
    name: 🚀 Smoke Tests [${{ github.event.inputs.environment || 'staging' }}]
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke Tests
        run: npx playwright test tests/e2e/Candidate/01-create-candidate.spec.ts tests/e2e/homepage/04-homepage-search.spec.ts --workers=1
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ZEROSTEP_TOKEN: ${{ secrets.ZEROSTEP_TOKEN }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_OTP: ${{ secrets.TEST_OTP }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

      - name: Upload Smoke Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 7

  # ── Job 2: Full E2E Tests ──────────────────────────────────────────────
  e2e:
    name: 🎭 Full E2E Tests [${{ github.event.inputs.environment || 'staging' }}]
    needs: smoke
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install Allure commandline
        run: npm install -g allure-commandline

      - name: Restore Allure history
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-history
          path: allure-history

      - name: Run Full E2E Tests
        run: npx playwright test --workers=1
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ZEROSTEP_TOKEN: ${{ secrets.ZEROSTEP_TOKEN }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_OTP: ${{ secrets.TEST_OTP }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-history" ]; then
            allure generate allure-results --clean -o allure-report --history allure-history
          else
            allure generate allure-results --clean -o allure-report
          fi

      - name: Save Allure history
        if: always()
        run: cp -r allure-report/history allure-history || true

      - name: Upload Allure history artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-history
          path: allure-history
          retention-days: 30

      - name: Generate Test Summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Reports" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright Report: https://Rohit4633.github.io/playwright-zerostep-e2e/" >> $GITHUB_STEP_SUMMARY
          echo "- Allure Report: https://Rohit4633.github.io/playwright-zerostep-e2e/allure/" >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Test Results with Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-with-screenshots
          path: test-results/
          retention-days: 7

      - name: Deploy Playwright Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: .

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure
          keep_files: true